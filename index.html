<!DOCTYPE html>
<html>
<head>
    <title>Sistema de Gestão de Concertos</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f0f0f0;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            background-color: white;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        h1 {
            color: #333;
            text-align: center;
            margin-bottom: 30px;
        }
        .menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            padding: 20px;
        }
        .menu-item {
            background-color: #fff;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
            transition: transform 0.3s ease;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .menu-item:hover {
            transform: translateY(-5px);
        }
        .menu-item a {
            text-decoration: none;
            color: #333;
            font-size: 1.2em;
            font-weight: bold;
        }
        .menu-item p {
            color: #666;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Bem-vindo ao Sistema de Gestão de Concertos</h1>
        
        <div class="menu-grid">
            <div class="menu-item">
                <a href="/artistas">
                    <h2>Artistas</h2>
                    <p>Gerir cadastro de artistas</p>
                </a>
            </div>
            
            <div class="menu-item">
                <a href="/concertos">
                    <h2>Concertos</h2>
                    <p>Ver programação de concertos</p>
                </a>
            </div>
            
            <div class="menu-item">
                <a href="/reservas">
                    <h2>Reservas</h2>
                    <p>Gerenciar reservas de lugares</p>
                </a>
            </div>
        </div>
    </div>
</body>
</html>
