<script>
    function editarArtista(id, nome, estilo, data_nascimento, contacto, discografia) {
        document.getElementById('update_id').value = id;
        document.getElementById('update_nome').value = nome;
        document.getElementById('update_estilo').value = estilo;
        document.getElementById('update_data_nascimento').value = data_nascimento;
        document.getElementById('update_contacto').value = contacto;
        document.getElementById('update_discografia').value = discografia;
        document.getElementById('updateModal').style.display = 'block';
    }

</script>
